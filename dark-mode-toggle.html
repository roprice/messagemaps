<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
  <title>Message Maps</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>


  <!-- Google Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Google Variable Fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="files/styles.css" rel="stylesheet">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* Light theme styles */
body {
  background-color: #fff;
  color: #000;
}

.navbar {
  background-color: #f8f9fa;
  color: #000;
}

.btn-outline-primary {
  border-color: #007bff;
  color: #007bff;
}


.dark button#theme-toggle {
    border-color: white;
    color: white;
}


#theme-toggle.btn:focus,
#theme-toggle.btn:active,
#theme-toggle.btn-outline-primary:focus,
#theme-toggle.btn-outline-primary:active {
  box-shadow: none;
  outline: none;
}

#theme-toggle.btn-outline-primary:focus:not(:disabled):not(.disabled),
#theme-toggle.btn-outline-primary:active:not(:disabled):not(.disabled) {

  background-color: transparent;
}

.light {
  background-color: #fff;
  color: #000;
  transition: all 0.3s ease-in-out;
}

.dark {
  background-color: #222;
  color: #fff;
  transition: all 0.3s ease-in-out;
}

body.dark span#light-icon {
    color: white;
}


.material-symbols-outlined {
  font-family: 'Material Symbols Outlined';
  font-variation-settings:
    'FILL' 0,
    'wght' 400,
    'GRAD' 0,
    'opsz' 48;
  transition: all 0.2s ease-in-out;
}

.material-symbols-outlined:hover {
  font-variation-settings: 'FILL' 1;
}



/* Dark theme styles */
.dark {
  background-color: #222;
  color: #fff;
}

.dark .navbar {
  background-color: #343a40;
  color: #fff;
}

.dark .btn-outline-primary {
  border-color: #fff;
  color: #fff;
}


.material-symbols-outlined {
  font-family: 'Material Symbols Outlined';
  font-size: 1.5rem;
  color: #222;
  position: relative;
  top: 1px;
  margin-right: 8px;
}

.light {
  background-color: #fff;
  color: #222;
}

.dark {
  background-color: #222;
  color: #fff;
}

.navbar {
  background-color: #f8f9fa;
  color: #222;
}

.btn-outline-primary {
  border-color: #222;
  color: #222;
}

.light .navbar {
  background-color: #f8f9fa;
  color: #222;
}

.light .btn-outline-primary {
  border-color: #222;
  color: #222;
}

.dark .navbar {
  background-color: #343a40;
  color: #fff;
}

.dark .btn-outline-primary {
  border-color: #fff;
  color: #fff;
}

.light div#navbarNav * {
    color: #222;
}
</style>
</head>
<body x-show x-transition.duration.1000ms>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link "  href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>
      </div>
      <div class="d-flex">
        <div class="d-flex">
            <button class="btn btn-outline-primary me-2" id="theme-toggle">
              <span class="material-symbols-outlined large fade-icon dark-icon" id="dark-icon">dark_mode</span>
              <span class="material-symbols-outlined large fade-icon light-icon" id="light-icon">light_mode</span>
            </button>
            <style>
                body.dark #dark-icon {
                  display: none;
                }
                body.light #light-icon {
                  display: none;
                }

                .fade-icon {
                    transition: opacity 5.3s ease-in-out;
                }
                .fade-icon.fade-out {
                    opacity: 0;
                }
                .fade-icon.fade-in {
                    opacity: 1;
                }

            </style>
          </div>
      </div>
    </div>
  </nav>
  <div class="container p-5">
    <h1>Welcome to my website!</h1>
    <p>This is an example of a dark/light theme toggle using Bootstrap 5.</p>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script >

// Set data-bs-theme and body class based on user's preferred color scheme
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.setAttribute('data-bs-theme', 'dark');
  document.body.classList.add('dark');
} else {
  document.documentElement.setAttribute('data-bs-theme', 'light');
  document.body.classList.add('light');
}

// Toggle theme on button click
document.getElementById('theme-toggle').addEventListener('click', function() {
  var html = document.documentElement;
  var body = document.body;
  var darkIcon = document.getElementById('dark-icon');
  var lightIcon = document.getElementById('light-icon');
  var currentIcon = html.getAttribute('data-bs-theme') === 'dark' ? darkIcon : lightIcon;

  // Determine the current theme and the new theme
  var currentTheme = html.getAttribute('data-bs-theme');
  var newTheme = currentTheme === 'dark' ? 'light' : 'dark';

  // Set the new theme for the HTML and body tags
  html.setAttribute('data-bs-theme', newTheme);
  body.classList.remove(currentTheme);
  body.classList.add(newTheme);
});





    </script>
</body>
</html>
